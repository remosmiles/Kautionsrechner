<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVZ URI Master 2026 | OB & Kautions-System</title>
    <style>
        :root {
            --uri-yellow: #FFD700;
            --uri-black: #1a1a1a;
            --uri-red: #d90429;
            --bg-grad: linear-gradient(135deg, #f8f9fa 0%, #cfd4da 100%);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-grad); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 750px; background: white; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); border-top: 10px solid var(--uri-black); overflow: hidden; }
        header { background: var(--uri-black); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--uri-yellow); }
        .content { padding: 20px; }
        .search-area { background: #e9ecef; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ced4da; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #ced4da; border-radius: 10px; font-size: 1rem; }
        .btn-add { background: var(--uri-black); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .type-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-right: 8px; }
        .badge-ob { background: #27ae60; color: white; }
        .badge-ord { background: #2980b9; color: white; }

        .cart-list { border: 1px solid #dee2e6; border-radius: 10px; background: #fff; margin-top: 10px; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; align-items: center; }
        .cart-item b { color: var(--uri-red); }
        
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .config-box { background: #f8f9fa; padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        
        .result-panel { background: var(--uri-black); color: white; padding: 30px; border-radius: 15px; margin-top: 25px; text-align: center; }
        .total-val { font-size: 3.5rem; font-weight: 900; color: var(--uri-yellow); display: block; }
        
        .footer { font-size: 0.7rem; text-align: center; color: #777; padding: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 style="margin:0; font-size:1.3rem;">SVZ URI Master 2026</h1>
        <div style="font-size:0.75rem; color:var(--uri-yellow); margin-top:5px; font-weight:bold;">OBV-LISTE & STRAFMASSEMPFEHLUNGEN</div>
    </header>

    <div class="content">
        <div class="search-area">
            <label style="font-weight:bold; font-size:0.8rem; color:#444; margin-bottom:8px; display:block;">DELIKT-SUCHE (OB & ORDENTLICH)</label>
            <input type="text" id="delSearch" list="fullDB" placeholder="z.B. Reifen, Gewicht, Licht, Telefon, ARV...">
            <datalist id="fullDB"></datalist>
            <button class="btn-add" onclick="addItem()">+ TATBESTAND HINZUFÜGEN</button>
        </div>

        <div class="cart-list" id="cartDisplay">
            <div style="padding:20px; text-align:center; color:#999;">Keine Tatbestände erfasst</div>
        </div>

        <div class="config-grid">
            <div class="config-box">
                <label style="font-weight:bold; font-size:0.75rem;">VERFAHREN (nur für Ordentlich)</label>
                <select id="tbVal" onchange="render()">
                    <option value="110">Standard TB (110.-)</option>
                    <option value="360">Komplex TB (360.-)</option>
                </select>
            </div>
            <div class="config-box">
                <label style="font-weight:bold; font-size:0.75rem;">ZUSÄTZE (nur für Ordentlich)</label><br>
                <div style="font-size:0.8rem; margin-top:5px;">
                    <input type="checkbox" id="waage" onchange="render()"> Waage (+25.-)<br>
                    <input type="checkbox" id="tko" onchange="render()"> TKO (+60.-)<br>
                    <input type="checkbox" id="video" onchange="render()"> Video (+150.-)
                </div>
            </div>
        </div>

        <div class="result-panel">
            <span style="font-size:0.85rem; opacity:0.8;">GESAMTBETRAG (CHF)</span>
            <span class="total-val" id="totalVal">0.00</span>
            <div id="breakdown" style="font-size:0.8rem; color:#aaa; margin-top:10px;"></div>
        </div>
    </div>

    <div class="footer">
        Basierend auf OBV Anhang 1 und Strafmassempfehlungen Uri 2026[cite: 7, 15, 16].<br>
        Bei reinen OB-Fällen entfallen Gebühren und TB-Aufnahme.
    </div>
</div>

<script>
    const database = [
        // --- ORDNUNGSBUSSEN (OBV) ---
        { n: "OB 303.1: Geschw. +1-5 km/h (I/A/AB)", b: 40, t: "ob" },
        { n: "OB 303.2: Geschw. +6-10 km/h (I/A/AB)", b: 120, t: "ob" },
        { n: "OB 311: Telefonieren ohne Freisprechanlage", b: 100, t: "ob" },
        { n: "OB 314.1: Nichtbenützen rechter Fahrstreifen (AB)", b: 60, t: "ob" },
        { n: "OB 330: Kontrollschild nicht vorschriftsgemäss", b: 60, t: "ob" },
        { n: "OB 332.a: Nachtfahrverbot bis 1 Std", b: 100, t: "ob" },
        { n: "OB 332.b: Nachtfahrverbot bis 2 Std", b: 200, t: "ob" },
        { n: "OB 402.1: Reifen unter 1.6 mm Profil (pro Rad)", b: 100, t: "ob" },
        { n: "OB 404: Kontrollschild fehlt am Fahrzeug", b: 140, t: "ob" },
        { n: "OB 300.1.a: Gewicht: Überlast bis 100 kg", b: 100, t: "ob" },
        { n: "OB 300.1.b: Gewicht: bis 3.5t / >100 kg / ≤5%", b: 200, t: "ob" },
        { n: "OB 300.1.c: Gewicht: >3.5t / >100 kg / ≤5% (max 1t)", b: 250, t: "ob" },
        { n: "OB 300.3.a: Achslast: >2% bis ≤5%", b: 40, t: "ob" },
        { n: "OB 300.3.b: Achslast: >5%", b: 100, t: "ob" },
        { n: "OB 309.1: Rotlicht missachtet (einfach)", b: 250, t: "ob" },
        { n: "OB 321.1: Richtungsanzeiger nicht betätigt", b: 100, t: "ob" },
        { n: "OB 323.1: Fahren ohne Licht tagsüber", b: 40, t: "ob" },

        // --- ORDENTLICHE VERZEIGUNGEN (URI 2026) ---
        { n: "ORD: Gewicht: LW > 5% oder > 1000 kg", b: 300, t: "ord" },
        { n: "ORD: Bremse: Betriebsbr. ohne Funktion (1 Rad/LW)", b: 1000, t: "ord" },
        { n: "ORD: Bremse: Betriebsbr. ungenügend < 2/3 (1 Rad/LW)", b: 380, t: "ord" },
        { n: "ORD: Reifen: Gewebe/Karkasse sichtbar (pro Rad)", b: 500, t: "ord" },
        { n: "ORD: ARV1: Lenkzeit überschritten (pro Std)", b: 100, t: "ord" },
        { n: "ORD: ARV1: Ruhezeit unterschritten (pro Std)", b: 100, t: "ord" },
        { n: "ORD: ARV1: Fahren ohne Fahrerkarte/Einlageblatt", b: 500, t: "ord" },
        { n: "ORD: Ladung: Ungenügend gesichert (Basis)", b: 250, t: "ord" },
        { n: "ORD: Ladung: Grobes Gefährdungspotenzial", b: 900, t: "ord" },
        { n: "ORD: Manipulation Abgasreinigung (AdBlue)", b: 1000, t: "ord" },
        { n: "ORD: Manipulation Fahrtschreiber (RAG/Sensoren)", b: 1000, t: "ord" },
        { n: "ORD: ADR Sicherung mangelhaft > 1500 daN", b: 900, t: "ord" }
    ];

    let cart = [];
    const dl = document.getElementById('fullDB');
    database.forEach(d => { let o = document.createElement('option'); o.value = d.n; dl.appendChild(o); });

    function addItem() {
        const val = document.getElementById('delSearch').value;
        const entry = database.find(x => x.n === val);
        if (entry) {
            cart.push({...entry, id: Date.now()});
            document.getElementById('delSearch').value = "";
            render();
        }
    }

    function removeItem(id) {
        cart = cart.filter(x => x.id !== id);
        render();
    }

    function getStAGebuehr(b) {
        if (b === 0) return 0;
        if (b <= 180) return 100; if (b <= 260) return 150; if (b <= 299) return 200;
        if (b < 400) return 250; if (b < 500) return 300; if (b < 1000) return 350;
        if (b < 2000) return 500; if (b < 5000) return 600; return 700;
    }

    function render() {
        const display = document.getElementById('cartDisplay');
        display.innerHTML = cart.length === 0 ? '<div style="padding:20px; text-align:center; color:#999;">Keine Tatbestände erfasst</div>' : "";
        
        let sumBussen = 0;
        let hasOrdentlich = false;

        cart.forEach(i => {
            sumBussen += i.b;
            if (i.t === "ord") hasOrdentlich = true;
            const row = document.createElement('div');
            row.className = 'cart-item';
            row.innerHTML = `<div><span class="type-badge badge-${i.t}">${i.t}</span>${i.n}</div> <span><b>${i.b}.-</b> <span style="cursor:pointer; color:#ccc; margin-left:10px;" onclick="removeItem(${i.id})">×</span></span>`;
            display.appendChild(row);
        });

        // Gebührenlogik: Nur wenn mindestens ein ordentliches Delikt dabei ist
        const sta = hasOrdentlich ? getStAGebuehr(sumBussen) : 0;
        const tb = hasOrdentlich ? parseFloat(document.getElementById('tbVal').value) : 0;
        let extra = 0;
        if (hasOrdentlich) {
            if (document.getElementById('waage').checked) extra += 25;
            if (document.getElementById('tko').checked) extra += 60;
            if (document.getElementById('video').checked) extra += 150;
        }

        const total = sumBussen + sta + tb + extra;
        document.getElementById('totalVal').innerText = total.toFixed(2);
        
        if (hasOrdentlich) {
            document.getElementById('breakdown').innerHTML = `Bussen: ${sumBussen}.- | Gebühr StA: ${sta}.- | TB: ${tb}.- | Zusatz: ${extra}.-`;
        } else {
            document.getElementById('breakdown').innerHTML = cart.length > 0 ? "Rein kumulierte Ordnungsbussen (Keine Gebühren)" : "";
        }
    }
</script>
</body>
</html>
