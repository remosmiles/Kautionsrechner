<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVZ Uri 2026 | Bussen & Kaution</title>
    <style>
        :root { --uri-red: #e63946; --uri-dark: #1d3557; --uri-bg: #f1faee; --uri-blue: #457b9d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--uri-bg); padding: 10px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: var(--uri-dark); text-align: center; border-bottom: 3px solid var(--uri-red); padding-bottom: 10px; font-size: 1.2rem; }
        .section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--uri-blue); }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; color: var(--uri-dark); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        .db-search { background: #eef2f3; border: 2px solid var(--uri-blue); }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .check-item { background: white; padding: 8px; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; border: 1px solid #ddd; }
        .check-item input { width: auto; margin: 0; }

        .result-panel { background: var(--uri-dark); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
        .total-amount { font-size: 2.8rem; font-weight: bold; color: #a8dadc; display: block; }
        .details { text-align: left; font-size: 0.85rem; margin-top: 10px; line-height: 1.5; border-top: 1px solid #457b9d; padding-top: 10px; }
        
        .info-tag { font-size: 0.7rem; color: #777; text-align: center; margin-top: 10px; }
        strong { color: #f1faee; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚖️ SVZ Uri: Bussen- & Kautionsrechner</h1>

    <div class="section">
        <label>1. Delikt suchen (Datenbank 2026)</label>
        <input type="text" class="db-search" id="dbSearch" list="deliktListe" placeholder="Tippe z.B. Reifen, Gewicht, ARV, Geschwindigkeit..." oninput="selectDelikt()">
        <datalist id="deliktListe"></datalist>
        <p id="deliktInfo" style="font-size: 0.8rem; color: var(--uri-blue); margin: 0; font-style: italic;"></p>
    </div>

    <div class="section">
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Busse (CHF)</label>
                <input type="number" id="fineAmount" value="0" oninput="calculate()">
            </div>
            <div style="flex: 1;">
                <label>TB-Aufnahme</label>
                <select id="tbAufnahme" onchange="calculate()">
                    <option value="110">Standard (110.-)</option>
                    <option value="360">Komplex (360.-)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="section">
        <label>Zusatz-Gebühren</label>
        <div class="checkbox-group">
            <div class="check-item"><input type="checkbox" id="tko" onchange="calculate()"> TKO (+60.-)</div>
            <div class="check-item"><input type="checkbox" id="waage" onchange="calculate()"> Waage (+25.-)</div>
            <div class="check-item"><input type="checkbox" id="video" onchange="calculate()"> Video (+150.-)</div>
        </div>
    </div>

    <div class="result-panel">
        <span>Total Kaution (Deposition)</span>
        <span class="total-amount" id="totalDisplay">0.00</span>
        
        <div class="details" id="detailsDisplay">
            Busse: 0.00 | Gebühr StA: 100.00 | TB: 110.00
        </div>
    </div>

    <p class="info-tag">Basierend auf Richtlinien Stand 12.01.2026[cite: 15]. Gültig ab 01.01.2026[cite: 16].</p>
</div>

<script>
    // Datenbank aus dem PDF (Auszug gängigste SVZ-Fälle)
    const bussenDB = [
        { name: "Geschwindigkeit: Innerorts +16-20 km/h", busse: 400, info: "SVG 27/1 [cite: 332]" },
        { name: "Geschwindigkeit: Ausserorts +21-24 km/h", busse: 400, info: "SVG 27/1 [cite: 332]" },
        { name: "Gewicht: Überlast bis 100kg (alle Fz)", busse: 100, info: "OBV 300.1.a [cite: 828]" },
        { name: "Gewicht: Überlast >3.5t bis 5% (max 1000kg)", busse: 250, info: "OBV 300.1.c [cite: 828]" },
        { name: "Reifen: Mangelhafter Reifen (pro Stück)", busse: 100, info: "OBV 402.1 [cite: 631]" },
        { name: "Reifen: Gewebe/Karkasse sichtbar (pro Rad)", busse: 500, info: "LW-Ansatz [cite: 631]" },
        { name: "ARV1: Tägliche Lenkzeit überschritten (pro Std)", busse: 100, info: "ARV1 5/1 [cite: 899, 901]" },
        { name: "ARV1: Fehlende Ruhezeit (pro Std)", busse: 100, info: "ARV1 9/1 [cite: 935, 944]" },
        { name: "ARV1: Fahren ohne Einlageblatt/Fahrerkarte", busse: 500, info: "ARV1 14/1 [cite: 975, 979]" },
        { name: "Technik: Bremsscheibe gerissen (pro Rad)", busse: 500, info: "LW-Ansatz [cite: 624]" },
        { name: "Technik: Betriebsbremse ohne Funktion (1 Rad)", busse: 1000, info: "LW-Ansatz [cite: 625]" },
        { name: "Ladung: Ungenügende Sicherung (leicht)", busse: 250, info: "SVG 30/2 [cite: 699, 705]" },
        { name: "Ladung: Ungenügende Sicherung (großes Gefährdungspat.)", busse: 900, info: "Uri Richtlinie [cite: 705]" },
        { name: "Nachtfahrverbot missachtet (bis 1 Std)", busse: 100, info: "OBV 332.a [cite: 817]" },
        { name: "Sonntagsfahrverbot missachtet", busse: 400, info: "VRV 91 [cite: 817]" }
    ];

    // Liste füllen
    const dl = document.getElementById('deliktListe');
    bussenDB.forEach(d => {
        let opt = document.createElement('option');
        opt.value = d.name;
        dl.appendChild(opt);
    });

    function selectDelikt() {
        const search = document.getElementById('dbSearch').value;
        const entry = bussenDB.find(d => d.name === search);
        if (entry) {
            document.getElementById('fineAmount').value = entry.busse;
            document.getElementById('deliktInfo').innerText = "Info: " + entry.info;
            calculate();
        }
    }

    function getGebuehr(busse) {
        if (busse <= 180) return 100; // 
        if (busse <= 260) return 150; // 
        if (busse <= 299) return 200; // 
        if (busse < 400) return 250;  // 
        if (busse < 500) return 300;  // 
        if (busse < 1000) return 350; // 
        if (busse < 2000) return 500; // 
        if (busse < 5000) return 600; // 
        return 700; // Gekürzt für Übersicht 
    }

    function calculate() {
        const busse = parseFloat(document.getElementById('fineAmount').value) || 0;
        const tb = parseFloat(document.getElementById('tbAufnahme').value);
        const sta = getGebuehr(busse);
        
        let extra = 0;
        if (document.getElementById('tko').checked) extra += 60; // 
        if (document.getElementById('waage').checked) extra += 25; // 
        if (document.getElementById('video').checked) extra += 150; // 

        const total = busse + tb + sta + extra;
        document.getElementById('totalDisplay').innerText = total.toFixed(2);
        document.getElementById('detailsDisplay').innerHTML = 
            `Busse: ${busse.toFixed(2)} | Gebühr StA: ${sta.toFixed(2)} | TB: ${tb.toFixed(2)}` + 
            (extra > 0 ? ` | Zusatz: ${extra.toFixed(2)}` : "");
    }
    
    calculate();
</script>

</body>
</html>
