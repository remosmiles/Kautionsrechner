<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVZ Uri 2026 | Multi-Kautionsrechner</title>
    <style>
        :root { --uri-red: #e63946; --uri-dark: #1d3557; --uri-blue: #457b9d; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 650px; }
        h1 { color: var(--uri-dark); text-align: center; border-bottom: 3px solid var(--uri-red); padding-bottom: 10px; margin-bottom: 20px; }
        .search-section { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid var(--uri-blue); }
        input, select, button { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 1rem; margin-top: 5px; }
        button { background: var(--uri-blue); color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
        button:hover { background: var(--uri-dark); }
        
        .list-section { margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; }
        .delikt-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .delikt-item:last-child { border-bottom: none; }
        .remove-btn { width: auto; padding: 4px 8px; background: #dc3545; font-size: 0.75rem; margin: 0; }

        .fee-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .fee-card { background: #f8f9fa; padding: 10px; border-radius: 6px; border-left: 4px solid var(--uri-red); }

        .result-panel { background: var(--uri-dark); color: white; padding: 25px; border-radius: 10px; text-align: center; margin-top: 20px; }
        .total-amount { font-size: 3rem; font-weight: bold; color: #a8dadc; display: block; }
        .footer { font-size: 0.7rem; color: #666; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚖️ SVZ Uri: Multi-Kautionsrechner</h1>

    <div class="search-section">
        <label>Delikt aus Liste wählen:</label>
        <input type="text" id="deliktSearch" list="bussenliste" placeholder="Suchen (z.B. Gewicht, Reifen, Bremsen, ARV)...">
        <datalist id="bussenliste"></datalist>
        <button onclick="addDelikt()">+ Delikt hinzufügen</button>
    </div>

    <div class="list-section">
        <label>Aktuelle Delikte am Fahrzeug:</label>
        <div id="activeList">
            </div>
    </div>

    <div class="fee-section">
        <div class="fee-card">
            <label>TB-Aufnahme</label>
            <select id="tbType" onchange="render()">
                <option value="110">Standard (110.-)</option>
                <option value="360">Komplex (360.-)</option>
            </select>
        </div>
        <div class="fee-card">
            <label>Optionen</label>
            <div style="font-size: 0.8rem;">
                <input type="checkbox" id="waage" onchange="render()"> Waage (+25.-)<br>
                <input type="checkbox" id="tko" onchange="render()"> TKO (+60.-)<br>
                <input type="checkbox" id="video" onchange="render()"> Video (+150.-)
            </div>
        </div>
    </div>

    <div class="result-panel">
        <span>Total Kaution (Deposition)</span>
        <span class="total-amount" id="totalVal">CHF 0.00</span>
        <div id="breakdown" style="font-size: 0.8rem; margin-top: 10px; opacity: 0.8;"></div>
    </div>

    <p class="footer">Strafmassempfehlungen Uri 2026. <br>Bei Kautionen > 5'000.- Staatsanwaltschaft informieren!</p>
</div>

<script>
    // Originaldaten aus dem Dokument 2026
    const db = [
        { n: "Gewicht: LW bis 100kg Überlast", b: 100 },
        { n: "Gewicht: LW > 100kg bis 5% (max 1t)", b: 250 },
        { n: "Gewicht: LW > 5% oder > 1t (Mindestbusse)", b: 300 },
        { n: "Achslast: bis 100kg Überlast", b: 100 },
        { n: "Reifen: Profil unter 1.6mm (pro Reifen)", b: 100 },
        { n: "Reifen: Gewebe/Karkasse sichtbar (LW)", b: 500 },
        { n: "Bremse: LW ohne Funktion (pro Rad)", b: 1000 },
        { n: "Bremse: LW ungenügend < 2/3 (pro Rad)", b: 380 },
        { n: "Bremse: LW ungenügend > 2/3 (pro Rad)", b: 150 },
        { n: "ARV1: Lenkzeit überschritten (pro Std)", b: 100 },
        { n: "ARV1: Ruhezeit unterschritten (pro Std)", b: 100 },
        { n: "ARV1: Fahren ohne Fahrerkarte/Einlageblatt", b: 500 },
        { n: "Ladung: Ungenügend gesichert (LW Standard)", b: 250 },
        { n: "Ladung: Ungenügend gesichert (Gefährdungspot.)", b: 900 },
        { n: "Nachtfahrverbot (bis 1 Std)", b: 100 },
        { n: "Sonntagsfahrverbot", b: 400 },
        { n: "Technik: Bremsscheibe gerissen (LW)", b: 500 },
        { n: "Technik: Fahrtschreiber Manipulation", b: 1000 }
    ];

    let cart = [];

    // Liste initialisieren
    const datalist = document.getElementById('bussenliste');
    db.forEach(item => {
        let opt = document.createElement('option');
        opt.value = item.n;
        datalist.appendChild(opt);
    });

    function addDelikt() {
        const val = document.getElementById('deliktSearch').value;
        const entry = db.find(x => x.n === val);
        if (entry) {
            cart.push({...entry, id: Date.now()});
            document.getElementById('deliktSearch').value = "";
            render();
        }
    }

    function removeDelikt(id) {
        cart = cart.filter(x => x.id !== id);
        render();
    }

    function getStAGebuehr(totalBusse) {
        if (totalBusse === 0) return 0;
        if (totalBusse <= 180) return 100;
        if (totalBusse <= 260) return 150;
        if (totalBusse <= 299) return 200;
        if (totalBusse < 400) return 250;
        if (totalBusse < 500) return 300;
        if (totalBusse < 1000) return 350;
        if (totalBusse < 2000) return 500;
        if (totalBusse < 5000) return 600;
        if (totalBusse < 8000) return 700;
        if (totalBusse < 10000) return 800;
        return 1000;
    }

    function render() {
        const listDiv = document.getElementById('activeList');
        listDiv.innerHTML = cart.length === 0 ? "<small>Noch kein Delikt gewählt</small>" : "";
        
        let totalBusse = 0;
        cart.forEach(item => {
            totalBusse += item.b;
            const row = document.createElement('div');
            row.className = 'delikt-item';
            row.innerHTML = `<span>${item.n}</span> <span><b>${item.b}.-</b> <button class="remove-btn" onclick="removeDelikt(${item.id})">X</button></span>`;
            listDiv.appendChild(row);
        });

        const sta = getStAGebuehr(totalBusse);
        const tb = parseFloat(document.getElementById('tbType').value);
        let extra = 0;
        if (document.getElementById('waage').checked) extra += 25;
        if (document.getElementById('tko').checked) extra += 60;
        if (document.getElementById('video').checked) extra += 150;

        const gesamt = totalBusse + sta + tb + extra;
        document.getElementById('totalVal').innerText = "CHF " + gesamt.toFixed(2);
        document.getElementById('breakdown').innerHTML = 
            `Bussen: ${totalBusse}.- | StA-Gebühr: ${sta}.- | TB: ${tb}.- | Zusatz: ${extra}.-`;
    }
</script>

</body>
</html>
